<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Radio Danmark Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px 220px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 25px 0 12px 5px;
            font-weight: 700;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .btn {
            position: relative;
            background: rgba(var(--brand-color), 0.1);
            border: 1px solid rgba(var(--brand-color), 0.2);
            border-radius: 16px;
            padding: 12px 6px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-dim);
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            min-height: 75px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn .icon {
            font-size: 20px;
            margin-bottom: 4px;
            opacity: 0.8;
            z-index: 2;
        }

        .btn span {
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            width: 95%;
            z-index: 2;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            white-space: normal;
        }

        .btn:hover, .btn.playing {
            background: rgba(var(--brand-color), 0.2);
            border-color: rgba(var(--brand-color), 0.6);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn.playing {
            background: rgba(var(--brand-color), 0.3);
            box-shadow: 0 8px 20px rgba(var(--brand-color), 0.2);
        }

        /* BRAND FARVER */
        .nova { --brand-color: 46, 204, 113; }
        .r100 { --brand-color: 52, 152, 219; }
        .soft { --brand-color: 41, 128, 185; }
        .soft-l { --brand-color: 135, 206, 250; }
        .voice { --brand-color: 230, 230, 230; }
        .pop { --brand-color: 155, 89, 182; }
        .mix { --brand-color: 233, 30, 99; }
        .dr { --brand-color: 231, 76, 60; }
        .vinyl { --brand-color: 243, 156, 18; }
        .retro { --brand-color: 211, 84, 0; }
        .party { --brand-color: 241, 196, 15; }

        /* FOOTER PLAYER */
        .footer-player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .info-stack { display: flex; flex-direction: column; }
        #current-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 700; }
        #current-name { font-size: 15px; font-weight: 700; margin-top: 1px; }

        .play-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .play-btn svg { fill: #000; width: 20px; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="section-title">Populære</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova', this)" class="btn nova"><span class="icon">✨</span><span>Nova</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100', this)" class="btn r100"><span class="icon">💯</span><span>Radio 100</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Radio Soft', this)" class="btn soft"><span class="icon">☁️</span><span>Radio Soft</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice', this)" class="btn voice"><span class="icon">🎤</span><span>The Voice</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM', this)" class="btn pop"><span class="icon">🎸</span><span>PopFM</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', 'Mix 7', this)" class="btn mix"><span class="icon">🕺</span><span>Mix 7</span></div>
    </div>

    <div class="section-title">DR Stationer</div>
    <div class="grid">
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p1/playlist-320000.m3u8', 'P1', this)" class="btn dr"><span class="icon">📰</span><span>P1</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p2/playlist-320000.m3u8', 'P2', this)" class="btn dr"><span class="icon">🎻</span><span>P2</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p3/playlist-320000.m3u8', 'P3', this)" class="btn dr"><span class="icon">⚡</span><span>P3</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p4sjaelland/masterab.m3u8', 'P4', this)" class="btn dr"><span class="icon">📍</span><span>P4</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p5/playlist-320000.m3u8', 'P5', this)" class="btn dr"><span class="icon">☕</span><span>P5</span></div>
    </div>

    <div class="section-title">Retro & Mix</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP01_premium_96.aac', 'Radio Vinyl', this)" class="btn vinyl"><span class="icon">📻</span><span>Radio Vinyl</span></div>
        <div onclick="play('http://stream.vinylhits.dk/vinylmp3', 'VinylHits', this)" class="btn vinyl"><span class="icon">💿</span><span>VinylHits</span></div>
        <div onclick="play('https://streammp3.retro-radio.dk/retro-mp3', 'Retro', this)" class="btn retro"><span class="icon">🎙️</span><span>Radio Retro</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP27_premium_96.aac', 'Weekend Mix', this)" class="btn mix"><span class="icon">🍹</span><span>Weekend Mix</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP11_premium_96.aac', 'Nova 100% Dansk', this)" class="btn nova"><span class="icon">🇩🇰</span><span>100% Dansk</span></div>
        <div onclick="play('http://stream1.partyfm.dk/Party128', 'PartyFM', this)" class="btn party"><span class="icon">🥳</span><span>PartyFM</span></div>
    </div>
</div>

<div class="footer-player">
    <div class="info-stack">
        <div id="current-label">Vælg station</div>
        <div id="current-name">Radio Danmark Pro</div>
    </div>
    <button class="play-btn" onclick="togglePlay()">
        <svg id="ctrl-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
</div>

<audio id="audio-engine" playsinline x-webkit-airplay="allow"></audio>

<script>
    const engine = document.getElementById('audio-engine');
    const ctrlIcon = document.getElementById('ctrl-icon');
    const nameLabel = document.getElementById('current-name');
    const statusLabel = document.getElementById('current-label');

    function play(url, name, el) {
        // Opdater UI knapper
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
        el.classList.add('playing');
        
        nameLabel.textContent = name;
        statusLabel.textContent = "Spiller nu";
        document.title = "▶ " + name;
        
        // Vigtigt for AirPlay: Nulstil stream ved nyt valg
        engine.pause();
        engine.src = url;
        engine.load();
        
        // Håndter Promise (nødvendigt for nogle mobile browsere)
        const playPromise = engine.play();
        if (playPromise !== undefined) {
            playPromise.catch(e => console.log("Afspilning kræver manuelt klik"));
        }

        updateIcon(true);

        // Metadata til Apple TV, Låseskærm og AirPlay-menu
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: name,
                artist: 'Radio Danmark Pro',
                album: 'Live Stream',
                artwork: [
                    { src: 'https://cdn-icons-png.flaticon.com/512/304/304164.png', sizes: '512x512', type: 'image/png' }
                ]
            });

            // Gør det muligt at bruge Apple TV/Fjernbetjening knapper
            navigator.mediaSession.setActionHandler('play', () => engine.play());
            navigator.mediaSession.setActionHandler('pause', () => engine.pause());
            navigator.mediaSession.setActionHandler('stop', () => engine.pause());
        }
    }

    function togglePlay() {
        if (engine.paused) { 
            engine.play(); 
            updateIcon(true); 
        } else { 
            engine.pause(); 
            updateIcon(false); 
        }
    }

    function updateIcon(playing) {
        ctrlIcon.innerHTML = playing 
            ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' 
            : '<path d="M8 5v14l11-7z"/>';
    }

    // Lyt til hændelser (hvis man pauser via låseskærm eller Apple TV remote)
    engine.onplay = () => updateIcon(true);
    engine.onpause = () => updateIcon(false);
</script>

</body>
</html>
