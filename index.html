<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Cast Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        
        h1 { margin-bottom: 5px; color: #f39c12; font-size: 28px; font-weight: 800; }
        .status-text { color: #aaa; font-size: 14px; margin-bottom: 25px; text-align: center; }
        
        h2 { width: 100%; max-width: 400px; font-size: 14px; color: #aaa; margin: 25px 0 10px 5px; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
        
        /* Knapperne er links med target="hidden_frame" */
        .btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: none; 
            padding: 18px 25px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active { transform: scale(0.96); filter: brightness(1.2); }

        /* Farveprofiler */
        .nova { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .radio100 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .the-voice { background: #ffffff; color: #000; }
        .soft { background: linear-gradient(135deg, #00adef, #005d82); }
        .popfm { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .pop-mix { background: linear-gradient(135deg, #662d91, #441e62); }
        .top-100 { background: linear-gradient(135deg, #fbb03b, #d97e00); }
        .soft-modern { background: linear-gradient(135deg, #7ec9ac, #4d8c75); }
        .soft-classic { background: linear-gradient(135deg, #5b7d87, #354a50); }

        /* Skjult iframe */
        #hidden_frame { display: none; }
    </style>
</head>
<body>

    <h1>Radio Cast</h1>
    <p class="status-text">Tryk på en station for at caste</p>

    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/nova-premium_96.aac" target="hidden_frame" class="btn nova">
            <span>Nova</span> <span>✨</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac" target="hidden_frame" class="btn radio100">
            <span>Radio 100</span> <span>💯</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac" target="hidden_frame" class="btn the-voice">
            <span>The Voice</span> <span>💬</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/soft-premium_96.aac" target="hidden_frame" class="btn soft">
            <span>Soft</span> <span>☁️</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac" target="hidden_frame" class="btn popfm">
            <span>PopFM</span> <span>🎤</span>
        </a>
    </div>

    <h2>Specials & Mix</h2>
    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac" target="hidden_frame" class="btn pop-mix">
            <span>Pop Mix</span> <span>🕺</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac" target="hidden_frame" class="btn top-100">
            <span>Top 100</span> <span>🏆</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac" target="hidden_frame" class="btn soft-modern">
            <span>Soft Modern</span> <span>🌿</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac" target="hidden_frame" class="btn soft-classic">
            <span>Soft Classic</span> <span>🎻</span>
        </a>
    </div>

    <iframe name="hidden_frame" id="hidden_frame"></iframe>

    <p style="margin-top: 40px; color: #444; font-size: 11px; text-align: center;">
        Optimerede til Web Video Caster
    </p>

</body>
</html>
