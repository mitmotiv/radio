<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Radio Danmark Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Radio Pro">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Logo-de-World-Hits-Radio.png/960px-Logo-de-World-Hits-Radio.png">
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJiaW5kZXIiOiAiUmFkaW8gRGFubWFyayBQcm8iLAogICJzaG9ydF9uYW1lIjogIlJhZGlvIFBybyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDgwODA4IiwKICAidGhlbWVfY29sb3IiOiAiIzA4MDgwOCIKfQ==">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #080808;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent: #ff4757;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px 280px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        .container { width: 100%; max-width: 550px; }

        .search-container {
            width: 100%;
            position: sticky;
            top: 10px;
            z-index: 100;
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: white;
            font-family: inherit;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 30px 0 12px 5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title.fav-title { color: var(--accent); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .btn {
            position: relative;
            background: rgba(var(--brand-color, 255, 255, 255), 0.05);
            border: 1px solid rgba(var(--brand-color, 255, 255, 255), 0.1);
            border-radius: 18px;
            padding: 12px 6px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            min-height: 85px;
            -webkit-tap-highlight-color: transparent;
        }

        .fav-heart {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 14px;
            color: var(--text-dim);
            opacity: 0.2;
            transition: 0.3s;
            padding: 4px;
            z-index: 10;
        }
        .btn.is-fav .fav-heart { opacity: 1; color: var(--accent); }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .btn.loading { animation: pulse 1s infinite; border-color: white; }

        .btn .icon { font-size: 22px; margin-bottom: 4px; }
        .btn span { font-size: 11px; font-weight: 500; text-align: center; line-height: 1.2; padding: 0 4px; }

        .btn.playing {
            background: rgba(var(--brand-color), 0.2);
            border-color: rgba(var(--brand-color), 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* BRAND FARVER */
        .nova { --brand-color: 46, 204, 113; }
        .r100 { --brand-color: 52, 152, 219; }
        .soft { --brand-color: 41, 128, 185; }
        .voice { --brand-color: 230, 230, 230; }
        .pop { --brand-color: 155, 89, 182; }
        .mix { --brand-color: 233, 30, 99; }
        .dr { --brand-color: 231, 76, 60; }
        .vinyl { --brand-color: 243, 156, 18; }
        .retro { --brand-color: 211, 84, 0; }
        .party { --brand-color: 241, 196, 15; }

        /* FOOTER PLAYER */
        .footer-player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 420px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .player-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .info-stack { flex: 1; overflow: hidden; padding-right: 10px; }
        #current-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; }
        #current-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 10px; }

        .visualizer { display: flex; align-items: flex-end; gap: 2px; height: 15px; opacity: 0; transition: 0.3s; }
        .visualizer.active { opacity: 1; }
        .v-bar { width: 3px; background: white; border-radius: 1px; height: 3px; }
        .active .v-bar { animation: bar-bounce 0.8s infinite alternate; }
        .active .v-bar:nth-child(2) { animation-delay: 0.2s; }
        .active .v-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bar-bounce { 0% { height: 3px; } 100% { height: 15px; } }

        .volume-container { display: flex; align-items: center; gap: 12px; }
        .volume-container svg { width: 18px; fill: white; opacity: 0.6; cursor: pointer; transition: 0.2s; }
        .volume-container svg:hover { opacity: 1; }
        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .play-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .play-btn:active { transform: scale(0.9); }
        .play-btn svg { fill: black; width: 24px; }

        #audio-engine { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Søg efter stationer..." aria-label="Søg radiostation">
    </div>
    <div id="station-list"></div>
</div>

<div class="footer-player">
    <div class="player-main">
        <div class="info-stack">
            <div id="current-label">Vælg station</div>
            <div id="current-name">
                Radio Danmark Pro
                <div class="visualizer" id="viz">
                    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                </div>
            </div>
        </div>
        <button class="play-btn" onclick="togglePlay()" aria-label="Afspil eller pause">
            <svg id="ctrl-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>
    <div class="volume-container">
        <svg id="mute-icon" onclick="toggleMute()" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
        <input type="range" class="volume-slider" id="vol-slider" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)" aria-label="Lydstyrke">
    </div>
</div>

<video id="audio-engine" playsinline webkit-playsinline x-webkit-airplay="allow" preload="auto"></video>

<script>
    const stations = [
        { id: 'nova', name: 'Nova', cat: 'Populære', icon: '✨', url: 'https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', class: 'nova' },
        { id: 'r100', name: 'Radio 100', cat: 'Populære', icon: '💯', url: 'https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', class: 'r100' },
        { id: 'soft', name: 'Radio Soft', cat: 'Populære', icon: '☁️', url: 'https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', class: 'soft' },
        { id: 'voice', name: 'The Voice', cat: 'Populære', icon: '🎤', url: 'https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', class: 'voice' },
        { id: 'popfm', name: 'PopFM', cat: 'Populære', icon: '🎸', url: 'https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', class: 'pop' },
        { id: 'mix7', name: 'Mix 7', cat: 'Populære', icon: '🕺', url: 'https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', class: 'mix' },
        { id: 'p5', name: 'P5', cat: 'DR Stationer', icon: '💃', url: 'https://drliveradio2.akamaized.net/hls/live/2118698/p5/playlist-320000.m3u8', class: 'dr' },
        { id: 'p4', name: 'P4', cat: 'DR Stationer', icon: '☕️', url: 'https://drliveradio2.akamaized.net/hls/live/2118698/p4sjaelland/masterab.m3u8', class: 'dr' },
        { id: 'p3', name: 'P3', cat: 'DR Stationer', icon: '⚡', url: 'https://drliveradio2.akamaized.net/hls/live/2118698/p3/playlist-320000.m3u8', class: 'dr' },
        { id: 'p2', name: 'P2', cat: 'DR Stationer', icon: '🎻', url: 'https://drliveradio2.akamaized.net/hls/live/2118698/p2/playlist-320000.m3u8', class: 'dr' },
        { id: 'p1', name: 'P1', cat: 'DR Stationer', icon: '📰', url: 'https://drliveradio2.akamaized.net/hls/live/2118698/p1/playlist-320000.m3u8', class: 'dr' },
        { id: 'vinyl', name: 'Radio Vinyl', cat: 'Retro', icon: '📻', url: 'https://live-bauerdk.sharp-stream.com/RP01_premium_96.aac', class: 'vinyl' },
        { id: 'vhits', name: 'VinylHits', cat: 'Retro', icon: '💿', url: 'https://stream.vinylhits.dk/vinylmp3', class: 'vinyl' },
        { id: 'retro', name: 'Retro', cat: 'Retro', icon: '🎙️', url: 'https://stream.retro-radio.dk/retro-mp3', class: 'retro' },
        { id: 'party', name: 'PartyFM', cat: 'Mix', icon: '🥳', url: 'https://stream.partyfm.dk/party128', class: 'party' },
        { id: 'wmix', name: 'Weekend Mix', cat: 'Mix', icon: '🍹', url: 'https://live-bauerdk.sharp-stream.com/RP27_premium_96.aac', class: 'mix' },
        { id: 'vix', name: 'The Voice Mix', cat: 'Mix', icon: '🎧', url: 'https://live-bauerdk.sharp-stream.com/RP16_premium_96.aac', class: 'voice' },
        { id: 'vtb', name: 'The Voice Throwback', cat: 'Mix', icon: '⏪', url: 'https://live-bauerdk.sharp-stream.com/RP17_premium_96.aac', class: 'voice' },
        { id: 'dansk', name: 'Nova 100% Dansk', cat: 'Mix', icon: '🇩🇰', url: 'https://live-bauerdk.sharp-stream.com/RP11_premium_96.aac', class: 'nova' },
        { id: 'top100', name: 'Top 100', cat: 'Mix', icon: '📈', url: 'https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac', class: 'r100' },
        { id: 'smod', name: 'Soft Modern', cat: 'Mix', icon: '✨', url: 'https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac', class: 'soft' },
        { id: 'scla', name: 'Soft Classic', cat: 'Mix', icon: '🎼', url: 'https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac', class: 'soft' }
    ];

    const engine = document.getElementById('audio-engine');
    const ctrlIcon = document.getElementById('ctrl-icon');
    const nameLabel = document.getElementById('current-name');
    const statusLabel = document.getElementById('current-label');
    const volSlider = document.getElementById('vol-slider');
    const muteIcon = document.getElementById('mute-icon');
    const viz = document.getElementById('viz');
    
    let hls = new Hls();
    let favorites = JSON.parse(localStorage.getItem('radioFavs')) || [];
    let currentStationId = null;
    let activeStationName = "Radio Danmark Pro";

    const savedVol = localStorage.getItem('radioVol') || 1;
    engine.volume = savedVol;
    volSlider.value = savedVol;

    // MediaSession setup
    function updateMediaMetadata(name) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: name,
                artist: 'Radio Danmark Pro',
                album: 'Live Radio',
                artwork: [{ 
                    src: 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Logo-de-World-Hits-Radio.png/960px-Logo-de-World-Hits-Radio.png', 
                    sizes: '512x512', 
                    type: 'image/png' 
                }]
            });
        }
    }

    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play', () => engine.play());
        navigator.mediaSession.setActionHandler('pause', () => engine.pause());
        navigator.mediaSession.setActionHandler('stop', () => { engine.pause(); engine.src = ""; });
    }

    function render(filter = '') {
        const list = document.getElementById('station-list');
        list.innerHTML = '';
        const filtered = stations.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()));
        
        const favStations = filtered.filter(s => favorites.includes(s.id));
        if (favStations.length > 0) { renderSection(list, "⭐ Dine Favoritter", favStations, true); }

        const categories = [...new Set(stations.map(s => s.cat))];
        categories.forEach(cat => {
            const catStations = filtered.filter(s => s.cat === cat);
            if (catStations.length > 0) { renderSection(list, cat, catStations, false); }
        });
    }

    function renderSection(parent, title, stationGroup, isFavSection) {
        const section = document.createElement('div');
        section.innerHTML = `<div class="section-title ${isFavSection ? 'fav-title' : ''}">${title}</div>`;
        const grid = document.createElement('div');
        grid.className = 'grid';
        stationGroup.forEach(s => {
            const isFav = favorites.includes(s.id);
            const isPlaying = currentStationId === s.id;
            const btn = document.createElement('div');
            btn.className = `btn ${s.class} ${isFav ? 'is-fav' : ''} ${isPlaying ? 'playing' : ''}`;
            btn.setAttribute('onclick', `handleBtnClick(event, '${s.url}', '${s.name}', this, '${s.id}')`);
            btn.innerHTML = `<div class="fav-heart" onclick="toggleFav(event, '${s.id}')">❤</div><span class="icon">${s.icon}</span><span>${s.name}</span>`;
            grid.appendChild(btn);
        });
        section.appendChild(grid);
        parent.appendChild(section);
    }

    function handleBtnClick(e, url, name, el, id) {
        if (e.target.classList.contains('fav-heart')) return;
        currentStationId = id;
        activeStationName = name;
        play(url, name, el);
    }

    function toggleFav(e, id) {
        e.stopPropagation();
        favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
        localStorage.setItem('radioFavs', JSON.stringify(favorites));
        render(document.getElementById('searchInput').value);
    }

    function play(url, name, el) {
        hls.detachMedia();
        hls.destroy();
        hls = new Hls();

        document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing', 'loading'));
        el.classList.add('loading');
        
        nameLabel.firstChild.textContent = name + " ";
        statusLabel.textContent = "Opretter forbindelse...";
        document.title = "⌛ " + name;

        if (url.includes('m3u8')) {
            if (Hls.isSupported()) {
                hls.loadSource(url);
                hls.attachMedia(engine);
            } else if (engine.canPlayType('application/vnd.apple.mpegurl')) {
                engine.src = url;
            }
        } else {
            engine.src = url;
        }

        engine.play().then(() => {
            updateMediaMetadata(name);
        }).catch(() => { 
            statusLabel.textContent = "Klik på Play for at starte"; 
            el.classList.remove('loading'); 
        });
    }

    function togglePlay() { 
        if (!engine.src && !hls.url) {
            statusLabel.textContent = "Vælg en station først";
            return;
        }
        engine.paused ? engine.play() : engine.pause(); 
    }

    function setVolume(val) { 
        engine.volume = val; 
        localStorage.setItem('radioVol', val);
        updateMuteIcon(val == 0);
    }

    function toggleMute() {
        engine.muted = !engine.muted;
        updateMuteIcon(engine.muted);
    }

    function updateMuteIcon(isMuted) {
        muteIcon.style.fill = isMuted ? '#ff4757' : 'white';
        muteIcon.style.opacity = isMuted ? '1' : '0.6';
    }

    engine.onplaying = () => {
        const loadingBtn = document.querySelector('.btn.loading');
        if (loadingBtn) loadingBtn.classList.replace('loading', 'playing');
        statusLabel.textContent = "Spiller nu";
        viz.classList.add('active');
        updateIcon(true);
        document.title = "▶ " + activeStationName;
        updateMediaMetadata(activeStationName);
    };

    engine.onpause = () => {
        viz.classList.remove('active');
        updateIcon(false);
        document.title = "Radio Danmark Pro";
    };

    engine.onerror = () => {
        statusLabel.textContent = "Stream fejl - prøv igen";
        document.title = "Radio Danmark Pro";
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('loading', 'playing'));
    };

    function updateIcon(playing) {
        ctrlIcon.innerHTML = playing 
            ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' 
            : '<path d="M8 5v14l11-7z"/>';
    }

    document.getElementById('searchInput').oninput = (e) => render(e.target.value);
    
    window.onunload = () => hls.destroy();

    render();
</script>

</body>
</html>
