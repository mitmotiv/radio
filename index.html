<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Streamer Pro</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            padding-bottom: 120px; /* Plads til afspilleren i bunden */
        }
        
        h1 { margin-bottom: 5px; color: #f39c12; font-size: 28px; font-weight: 800; }
        .status-text { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        
        h2 { width: 100%; max-width: 400px; font-size: 14px; color: #aaa; margin: 25px 0 10px 5px; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
        
        .btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: none; 
            padding: 18px 25px; 
            border-radius: 16px; 
            cursor: pointer;
            color: white; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active { transform: scale(0.96); }

        /* Farveprofiler */
        .nova { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .radio100 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .the-voice { background: #ffffff; color: #000; }
        .soft { background: linear-gradient(135deg, #00adef, #005d82); }
        .popfm { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .pop-mix { background: linear-gradient(135deg, #662d91, #441e62); }
        .top-100 { background: linear-gradient(135deg, #fbb03b, #d97e00); }
        .soft-modern { background: linear-gradient(135deg, #7ec9ac, #4d8c75); }
        .soft-classic { background: linear-gradient(135deg, #5b7d87, #354a50); }

        /* Fastgjort afspiller i bunden for Web Video Caster */
        .player-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e1e1e;
            padding: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 2px solid #333;
        }

        audio {
            width: 100%;
            max-width: 400px;
            height: 40px;
        }

        #current-station-name {
            margin-bottom: 10px;
            font-weight: bold;
            color: #f39c12;
        }
    </style>
</head>
<body>

    <h1>Radio Player</h1>
    <p class="status-text">Tryk for at sende til afspiller</p>

    <div class="grid">
        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova')" class="btn nova">
            <span>Nova</span> <span>✨</span>
        </button>

        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100')" class="btn radio100">
            <span>Radio 100</span> <span>💯</span>
        </button>

        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice')" class="btn the-voice">
            <span>The Voice</span> <span>💬</span>
        </button>

        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Soft')" class="btn soft">
            <span>Soft</span> <span>☁️</span>
        </button>

        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM')" class="btn popfm">
            <span>PopFM</span> <span>🎤</span>
        </button>
    </div>

    <h2>Specials & Mix</h2>
    <div class="grid">
        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', 'Pop Mix')" class="btn pop-mix">
            <span>Pop Mix</span> <span>🕺</span>
        </button>
        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac', 'Top 100')" class="btn top-100">
            <span>Top 100</span> <span>🏆</span>
        </button>
        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac', 'Soft Modern')" class="btn soft-modern">
            <span>Soft Modern</span> <span>🌿</span>
        </button>
        <button onclick="loadStream('https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac', 'Soft Classic')" class="btn soft-classic">
            <span>Soft Classic</span> <span>🎻</span>
        </button>
    </div>

    <div class="player-container">
        <div id="current-station-name">Ingen station valgt</div>
        <audio id="main-audio-player" controls>
            <source id="audio-source" src="" type="audio/aac">
            Din browser understøtter ikke audio elementet.
        </audio>
    </div>

    <script>
        const audioPlayer = document.getElementById('main-audio-player');
        const audioSource = document.getElementById('audio-source');
        const stationLabel = document.getElementById('current-station-name');

        function loadStream(url, name) {
            // Opdater kilden i HTML-elementet
            audioSource.src = url;
            stationLabel.textContent = "Valgt: " + name;
            
            // Genindlæs og afspil
            audioPlayer.load();
            audioPlayer.play();

            // Web Video Caster vil nu se at et <audio> tag forsøger at afspille en stream
            // og bør automatisk spørge om du vil caste den.
        }
    </script>

</body>
</html>
