<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            padding-bottom: 160px; /* God plads til afspilleren */
        }
        
        /* Denne overskrift ændrer vi med JavaScript */
        #main-title { 
            margin-bottom: 5px; 
            color: #f39c12; 
            font-size: 28px; 
            font-weight: 800; 
            text-align: center;
        }

        .status-header { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
        
        .btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            border: none;
            cursor: pointer;
        }
        
        .btn:active { transform: scale(0.97); filter: brightness(1.2); }

        /* Farveprofiler */
        .nova { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .radio100 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .the-voice { background: #ffffff; color: #000; }
        .soft { background: linear-gradient(135deg, #00adef, #005d82); }
        .popfm { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .pop-mix { background: linear-gradient(135deg, #662d91, #441e62); }
        .top-100 { background: linear-gradient(135deg, #fbb03b, #d97e00); }
        .soft-modern { background: linear-gradient(135deg, #7ec9ac, #4d8c75); }
        .soft-classic { background: linear-gradient(135deg, #5b7d87, #354a50); }

        /* Bund-afspiller sektion */
        .footer-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e1e1e;
            padding: 20px 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 9999;
        }

        #current-label {
            font-size: 16px;
            margin-bottom: 12px;
            color: #f39c12;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Video tag for bedst mulige WVC detection */
        video {
            width: 90%;
            max-width: 400px;
            height: 54px;
            background: #000;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <h1 id="main-title">Vælg Radio</h1>
    <p class="status-header">Tryk for at starte stream</p>

    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/nova-premium_96.aac" onclick="return startRadio(event, this.href, 'Nova')" class="btn nova">
            <span>Nova</span> <span>✨</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac" onclick="return startRadio(event, this.href, 'Radio 100')" class="btn radio100">
            <span>Radio 100</span> <span>💯</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac" onclick="return startRadio(event, this.href, 'The Voice')" class="btn the-voice">
            <span>The Voice</span> <span>💬</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/soft-premium_96.aac" onclick="return startRadio(event, this.href, 'Soft')" class="btn soft">
            <span>Soft</span> <span>☁️</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac" onclick="return startRadio(event, this.href, 'PopFM')" class="btn popfm">
            <span>PopFM</span> <span>🎤</span>
        </a>
    </div>

    <h2 style="font-size: 12px; color: #444; margin: 30px 0 10px 0; text-transform: uppercase;">Special kanaler</h2>
    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac" onclick="return startRadio(event, this.href, 'Pop Mix')" class="btn pop-mix">
            <span>Pop Mix</span> <span>🕺</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac" onclick="return startRadio(event, this.href, 'Top 100')" class="btn top-100">
            <span>Top 100</span> <span>🏆</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac" onclick="return startRadio(event, this.href, 'Soft Modern')" class="btn soft-modern">
            <span>Soft Modern</span> <span>🌿</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac" onclick="return startRadio(event, this.href, 'Soft Classic')" class="btn soft-classic">
            <span>Soft Classic</span> <span>🎻</span>
        </a>
    </div>

    <div class="footer-player">
        <div id="current-label">Ingen station valgt</div>
        <video id="player" controls playsinline></video>
    </div>

    <script>
        const player = document.getElementById('player');
        const mainTitle = document.getElementById('main-title');
        const footerLabel = document.getElementById('current-label');

        function startRadio(e, url, name) {
            // Forhindrer ny fane/side
            e.preventDefault();

            // 1. Opdater navnet øverst på siden
            mainTitle.textContent = name;
            
            // 2. Opdater navnet i afspilleren i bunden
            footerLabel.textContent = "Spiller nu: " + name;

            // 3. Opdater selve browserens fane-titel
            document.title = "▶ " + name;

            // 4. Konfigurer stream til Web Video Caster
            player.src = url;
            player.type = "audio/aac";
            player.title = name; // Vigtigt metadata for WVC
            
            player.load();
            player.play().catch(err => console.log("Play blocked by browser"));

            // Media Session gør at navnet også står på telefonens låseskærm
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: name,
                    artist: 'Radio Stream',
                    album: 'Live'
                });
            }

            return false;
        }
    </script>

</body>
</html>
