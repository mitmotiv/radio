<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Radio Danmark Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px 240px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 550px; }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 25px 0 12px 5px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        /* 1. LOADING & BUTTON STYLES */
        .btn {
            position: relative;
            background: rgba(var(--brand-color), 0.1);
            border: 1px solid rgba(var(--brand-color), 0.2);
            border-radius: 16px;
            padding: 12px 6px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            min-height: 75px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn.playing {
            background: rgba(var(--brand-color), 0.25);
            border-color: rgba(var(--brand-color), 0.8);
            color: #fff;
            transform: scale(0.98);
        }

        /* Puls-animation når den loader */
        .btn.loading {
            animation: pulse 1.5s infinite;
            opacity: 0.6;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(0.95); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        .btn .icon { font-size: 20px; margin-bottom: 4px; }
        .btn span { font-size: 11px; font-weight: 500; text-align: center; width: 95%; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* BRAND FARVER */
        .nova { --brand-color: 46, 204, 113; }
        .r100 { --brand-color: 52, 152, 219; }
        .soft { --brand-color: 41, 128, 185; }
        .voice { --brand-color: 230, 230, 230; }
        .pop { --brand-color: 155, 89, 182; }
        .mix { --brand-color: 233, 30, 99; }
        .dr { --brand-color: 231, 76, 60; }
        .vinyl { --brand-color: 243, 156, 18; }
        .retro { --brand-color: 211, 84, 0; }
        .party { --brand-color: 241, 196, 15; }

        /* FOOTER PLAYER */
        .footer-player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 450px;
            background: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .player-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .info-stack { display: flex; flex-direction: column; flex: 1; }
        #current-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; }
        #current-name { font-size: 15px; font-weight: 700; color: #fff; }

        /* 8. VISUALIZER */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 15px;
            margin-right: 15px;
            display: none; /* Skjult som standard */
        }
        .visualizer.active { display: flex; }
        .bar {
            width: 3px;
            background: #fff;
            border-radius: 1px;
            animation: bounce 1s ease-in-out infinite;
        }
        .bar:nth-child(2) { animation-delay: 0.2s; height: 60%; }
        .bar:nth-child(3) { animation-delay: 0.4s; height: 100%; }
        .bar:nth-child(4) { animation-delay: 0.1s; height: 80%; }

        @keyframes bounce {
            0%, 100% { height: 3px; }
            50% { height: 15px; }
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .play-btn svg { fill: #000; width: 22px; height: 22px; }

        /* 9. VOLUME SLIDER */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 5px;
        }
        .volume-container svg { fill: var(--text-dim); width: 14px; }
        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        #audio-engine { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="section-title">Populære</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova', this)" class="btn nova"><span class="icon">✨</span><span>Nova</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100', this)" class="btn r100"><span class="icon">💯</span><span>Radio 100</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Radio Soft', this)" class="btn soft"><span class="icon">☁️</span><span>Radio Soft</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice', this)" class="btn voice"><span class="icon">🎤</span><span>The Voice</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM', this)" class="btn pop"><span class="icon">🎸</span><span>PopFM</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', 'Mix 7', this)" class="btn mix"><span class="icon">🕺</span><span>Mix 7</span></div>
    </div>

    <div class="section-title">DR Stationer</div>
    <div class="grid">
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p1/playlist-320000.m3u8', 'P1', this)" class="btn dr"><span class="icon">📰</span><span>P1</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p2/playlist-320000.m3u8', 'P2', this)" class="btn dr"><span class="icon">🎻</span><span>P2</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p3/playlist-320000.m3u8', 'P3', this)" class="btn dr"><span class="icon">⚡</span><span>P3</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p4sjaelland/masterab.m3u8', 'P4', this)" class="btn dr"><span class="icon">📍</span><span>P4</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p5/playlist-320000.m3u8', 'P5', this)" class="btn dr"><span class="icon">☕</span><span>P5</span></div>
    </div>
</div>

<div class="footer-player">
    <div class="player-top">
        <div class="visualizer" id="viz">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="info-stack">
            <div id="current-label">Klar til afspilning</div>
            <div id="current-name">Vælg station</div>
        </div>
        <button class="play-btn" onclick="togglePlay()">
            <svg id="ctrl-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>
    
    <div class="volume-container">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
    </div>
</div>

<video id="audio-engine" playsinline x-webkit-airplay="allow"></video>

<script>
    const engine = document.getElementById('audio-engine');
    const ctrlIcon = document.getElementById('ctrl-icon');
    const nameLabel = document.getElementById('current-name');
    const statusLabel = document.getElementById('current-label');
    const viz = document.getElementById('viz');

    function play(url, name, el) {
        // Fjern loading/playing fra alle
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing', 'loading'));
        
        // Sæt knappen i "loading" tilstand med det samme
        el.classList.add('loading');
        
        nameLabel.textContent = name;
        statusLabel.textContent = "Henter stream...";
        document.title = "⌛ " + name;
        
        engine.pause();
        engine.removeAttribute('src');
        engine.load();
        
        engine.src = url;
        engine.load();
        engine.play().catch(e => console.log("Interaktion påkrævet"));

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: name,
                artist: 'Radio Danmark Pro',
                artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/304/304164.png', sizes: '512x512', type: 'image/png' }]
            });
        }
    }

    function togglePlay() {
        if (engine.paused) { engine.play(); } 
        else { engine.pause(); }
    }

    function setVolume(val) {
        engine.volume = val;
    }

    // EVENT LISTENERS FOR FEEDBACK
    engine.onwaiting = () => {
        statusLabel.textContent = "Buffer...";
    };

    engine.onplaying = () => {
        statusLabel.textContent = "Spiller nu";
        document.title = "▶ " + nameLabel.textContent;
        viz.classList.add('active');
        updateIcon(true);
        
        // Find den aktive knap og skift fra loading til playing
        const activeBtn = document.querySelector('.btn.loading');
        if (activeBtn) {
            activeBtn.classList.remove('loading');
            activeBtn.classList.add('playing');
        }
    };

    engine.onpause = () => {
        viz.classList.remove('active');
        updateIcon(false);
        document.title = "Radio Danmark Pro";
    };

    function updateIcon(playing) {
        ctrlIcon.innerHTML = playing 
            ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' 
            : '<path d="M8 5v14l11-7z"/>';
    }
</script>

</body>
</html>
