<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Cast Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        
        h1 { margin-bottom: 5px; color: #f39c12; font-size: 28px; font-weight: 800; }
        .status-text { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
        
        .btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: none; 
            padding: 18px 25px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            cursor: pointer;
        }
        
        .btn:active { transform: scale(0.96); filter: brightness(1.2); }

        .nova { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .radio100 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .the-voice { background: #ffffff; color: #000; }
        .soft { background: linear-gradient(135deg, #00adef, #005d82); }
        .popfm { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .pop-mix { background: linear-gradient(135deg, #662d91, #441e62); }
        .top-100 { background: linear-gradient(135deg, #fbb03b, #d97e00); }
        .soft-modern { background: linear-gradient(135deg, #7ec9ac, #4d8c75); }
        .soft-classic { background: linear-gradient(135deg, #5b7d87, #354a50); }

        /* Skjul den rigtige afspiller helt */
        #hidden-player { display: none; }
    </style>
</head>
<body>

    <h1>Radio Cast</h1>
    <p id="info" class="status-text">Vælg station for at caste</p>

    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/nova-premium_96.aac" onclick="handleCast(event, this.href, 'Nova')" class="btn nova">
            <span>Nova</span> <span>✨</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac" onclick="handleCast(event, this.href, 'Radio 100')" class="btn radio100">
            <span>Radio 100</span> <span>💯</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac" onclick="handleCast(event, this.href, 'The Voice')" class="btn the-voice">
            <span>The Voice</span> <span>💬</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/soft-premium_96.aac" onclick="handleCast(event, this.href, 'Soft')" class="btn soft">
            <span>Soft</span> <span>☁️</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac" onclick="handleCast(event, this.href, 'PopFM')" class="btn popfm">
            <span>PopFM</span> <span>🎤</span>
        </a>
    </div>

    <h2 style="font-size: 14px; color: #aaa; margin: 25px 0 10px 0; text-transform: uppercase;">Specials</h2>
    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac" onclick="handleCast(event, this.href, 'Pop Mix')" class="btn pop-mix">
            <span>Pop Mix</span> <span>🕺</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac" onclick="handleCast(event, this.href, 'Top 100')" class="btn top-100">
            <span>Top 100</span> <span>🏆</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac" onclick="handleCast(event, this.href, 'Soft Modern')" class="btn soft-modern">
            <span>Soft Modern</span> <span>🌿</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac" onclick="handleCast(event, this.href, 'Soft Classic')" class="btn soft-classic">
            <span>Soft Classic</span> <span>🎻</span>
        </a>
    </div>

    <video id="hidden-player" controls playsinline></video>

    <script>
        function handleCast(event, url, name) {
            // 1. VIGTIGT: Stop browseren fra at åbne en ny fane/link
            event.preventDefault();

            const player = document.getElementById('hidden-player');
            const info = document.getElementById('info');

            // 2. Opdater den usynlige afspiller
            player.src = url;
            player.load();
            
            // 3. Start afspilning - dette trigger "Gult Play Ikon" eller Cast-menu i WVC
            player.play().then(() => {
                info.textContent = "Sender " + name + " til Chromecast...";
            }).catch(err => {
                info.textContent = "Tryk igen for at bekræfte";
            });
        }
    </script>

</body>
</html>
