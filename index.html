<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Stream</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #121212; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; padding-bottom: 160px;
        }
        
        h1 { color: #f39c12; font-size: 24px; margin-bottom: 20px; text-align: center; }
        
        .grid { 
            display: grid; grid-template-columns: 1fr; gap: 10px; 
            width: 100%; max-width: 400px; 
        }
        
        .btn { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px; border-radius: 12px; border: none;
            color: white; font-weight: bold; font-size: 18px;
            cursor: pointer; transition: 0.2s;
        }
        
        .btn:active { transform: scale(0.98); }

        /* Bauer Farver */
        .nova { background: #27ae60; }
        .radio100 { background: #2980b9; }
        .the-voice { background: #ffffff; color: #000; }
        .soft { background: #00adef; }
        .popfm { background: #8e44ad; }
        .special { background: #333; }

        /* Afspiller-bar i bunden */
        .footer-player {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1e1e1e; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
            border-top: 1px solid #333; z-index: 1000;
        }

        #station-name { font-weight: bold; color: #f39c12; margin-bottom: 10px; }
        
        /* Video-tag bruges fordi WVC opfanger det bedre end audio til Chromecast */
        video { width: 90%; max-width: 400px; height: 45px; border-radius: 4px; }

        /* Skjult sektion til WVC-snifferen */
        #wvc-sniffer { display: none; }
    </style>
</head>
<body>

    <h1 id="display-title">Vælg Station</h1>

    <div class="grid">
        <button onclick="castOriginal('https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice')" class="btn the-voice">The Voice 💬</button>
        <button onclick="castOriginal('https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova')" class="btn nova">Nova ✨</button>
        <button onclick="castOriginal('https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100')" class="btn radio100">Radio 100 💯</button>
        <button onclick="castOriginal('https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Soft')" class="btn soft">Soft ☁️</button>
        <button onclick="castOriginal('https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM')" class="btn popfm">PopFM 🎤</button>
        
        <h2 style="font-size: 14px; color: #666; margin-top: 20px;">Specials</h2>
        <button onclick="castOriginal('https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', 'Pop Mix')" class="btn special">Pop Mix 🕺</button>
        <button onclick="castOriginal('https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac', 'Top 100')" class="btn special">Top 100 🏆</button>
    </div>

    <div class="footer-player">
        <div id="station-name">Vælg en kilde</div>
        <video id="main-video-element" controls playsinline title="Radio Stream"></video>
    </div>

    <div id="wvc-sniffer">
        <a href="https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac">The Voice</a>
        <a href="https://live-bauerdk.sharp-stream.com/nova-premium_96.aac">Nova</a>
        <a href="https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac">Radio 100</a>
        <a href="https://live-bauerdk.sharp-stream.com/soft-premium_96.aac">Soft</a>
        <a href="https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac">PopFM</a>
        <a href="https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac">Pop Mix</a>
        <a href="https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac">Top 100</a>
    </div>

    <script>
        const video = document.getElementById('main-video-element');
        const title = document.getElementById('display-title');
        const label = document.getElementById('station-name');

        function castOriginal(url, name) {
            // 1. Opdater UI
            title.textContent = name;
            label.textContent = "Original kilde: " + name;
            document.title = name;

            // 2. Sæt original URL direkte (Dette er nøglen!)
            // Ved at sætte den direkte på elementet, opfatter WVC linket som kilden.
            video.src = url;
            video.title = name;
            
            // 3. Tving indlæsning
            video.load();
            video.play();

            // 4. Send metadata til browserens OS (Media Session)
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: name,
                    artist: 'Bauer Media',
                    album: 'Live Stream'
                });
            }
        }
    </script>

</body>
</html>
